{% load static %}

<div class="post">

    <a href="{% url 'posts-detail-page' post.slug %}">

        <img src="{% static 'blog/images/'|add:post.image_name %}" alt="">

        <div class="post-content">

            <h3>{{ post.title }}</h3>

            <p>{{ post.excerpt }}</p>

        </div>

    </a>

</div>
