name: Generate Pydoc Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Django
      run: |
        pip install django

    - name: Generate Pydoc
      run: |
        mkdir docs

        pydoc -w manage
        mv manage.html docs/index.html

        pydoc -w blog.models
        mv blog.models.html docs/

        pydoc -w blog.views
        mv blog.views.html docs/

        pydoc -w blog.urls
        mv blog.urls.html docs/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
