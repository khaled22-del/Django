name: Generate Pydoc Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install django pillow

    - name: Configure Django
      run: |
        export DJANGO_SETTINGS_MODULE=my_site.settings
        python -c "import django; django.setup()"

    - name: Generate Pydoc
      env:
        DJANGO_SETTINGS_MODULE: my_site.settings
      run: |
        mkdir docs

        python -m pydoc -w manage
        mv manage.html docs/index.html

        python -m pydoc -w blog.models
        mv blog.models.html docs/

        python -m pydoc -w blog.views
        mv blog.views.html docs/

        python -m pydoc -w blog.urls
        mv blog.urls.html docs/

        python -m pydoc -w blog.apps
        mv blog.apps.html docs/

        python -m pydoc -w blog.admin
        mv blog.admin.html docs/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
